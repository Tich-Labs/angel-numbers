<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Numbers</title>
    <meta name="description" content="Discover the spiritual meaning of angel numbers">
    <meta name="theme-color" content="#1e1b4b">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'spirit-deep': '#1e1b4b',
          'spirit-light': '#f5f3ff',
          'spirit-accent': '#ddd6fe',
          'spirit-gold': '#fef3c7',
          'spirit-glow': '#8b5cf6',
        }
      }
    }
  }
</script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cinzel', serif; }
        @keyframes manifest {
            0% { opacity: 0; filter: blur(10px); transform: translateY(10px); }
            100% { opacity: 1; filter: blur(0); transform: translateY(0); }
        }
        .animate-manifest {
            animation: manifest 0.8s ease-out forwards;
        }
    </style>
</head>
<body class="bg-spirit-light min-h-screen flex items-center justify-center p-4 
             bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] 
             from-spirit-accent/20 via-spirit-light to-spirit-light">
    <div class="max-w-md w-full">
        <div id="inputArea" class="backdrop-blur-md bg-white/70 border border-white/50 
                    rounded-3xl shadow-[0_8px_32px_0_rgba(139,92,246,0.1)] p-6 transition-opacity duration-500">
      
      <h1 class="text-2xl font-light tracking-widest text-spirit-deep uppercase text-center mb-4">
        Angel <span class="font-bold">Numbers</span>
      </h1>
      
      <div class="h-1 w-10 bg-spirit-glow mx-auto mb-6 rounded-full"></div>

      <input type="number" 
             id="numberInput"
             maxlength="4"
             class="w-full bg-white/50 border-b-2 border-spirit-accent focus:border-spirit-glow 
                    outline-none text-center text-3xl py-3 transition-all placeholder:text-spirit-accent/50"
             placeholder="000">

      <button id="searchBtn" class="w-full mt-6 bg-spirit-deep text-white tracking-widest uppercase py-3 
                     rounded-xl hover:bg-spirit-glow hover:shadow-lg hover:shadow-spirit-glow/30 
                     transition-all active:scale-95 text-sm">
        Receive Message
      </button>
    </div>

        <div id="result" class="mt-4 hidden">
            <div class="max-w-md w-full backdrop-blur-md bg-white/70 border border-white/50 
                rounded-3xl shadow-[0_8px_32px_0_rgba(139,92,246,0.1)] p-6">
                <h2 class="text-2xl font-light tracking-widest text-center mb-4 text-spirit-deep">
                    <span id="resultNumber"></span>
                </h2>
                <div id="meanings" class="space-y-4"></div>
                <div id="sources" class="hidden"></div>
                <div id="cached" class="mt-4 text-center text-sm text-spirit-accent/60 hidden">
                    From cache
                </div>
            </div>
        </div>

        <div id="loading" class="mt-8 hidden">
            <div class="flex justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-spirit-glow"></div>
            </div>
        </div>

        <div id="error" class="mt-8 hidden">
            <div class="max-w-md w-full bg-red-50 border border-red-200 rounded-3xl p-4 text-center text-red-600">
                <span id="errorText"></span>
            </div>
        </div>

    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
